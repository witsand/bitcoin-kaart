<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Bitcoin Kaart — Orania">
  <!-- Master icon (source of truth) -->
  <rect width="512" height="512" fill="#F7931A"/>

  <!-- Map pin (bold, simple) -->
  <g transform="translate(256 292)">
    <path
      fill="#fff"
      d="M0-152c-58 0-105 47-105 105 0 63 54 136 105 246 51-110 105-183 105-246 0-58-47-105-105-105z"
    />

    <!-- Orania cue: an "O" (negative space) -->
    <circle cy="-102" r="50" fill="#F7931A"/>

    <!-- Bitcoin mark (white) inside the "O" (simple filled geometry for reliable rasterization) -->
    <g transform="translate(0 -102)" aria-hidden="true">
      <!-- vertical strokes -->
      <rect x="-22" y="-28" width="8" height="56" rx="4" fill="#fff"/>
      <rect x="14" y="-28" width="8" height="56" rx="4" fill="#fff"/>
      <!-- B bowls -->
      <rect x="-16" y="-28" width="36" height="26" rx="13" fill="#fff"/>
      <rect x="-16" y="2" width="40" height="26" rx="13" fill="#fff"/>
      <!-- cutouts to read as "B" -->
      <rect x="-2" y="-18" width="18" height="16" rx="8" fill="#F7931A"/>
      <rect x="-2" y="12" width="20" height="16" rx="8" fill="#F7931A"/>
    </g>
  </g>
</svg>
